services:
  db:
    image: postgis/postgis:16-3.4
    container_name: thesis_db
    environment:
      POSTGRES_DB: osm_ro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: MiculPrint2004!
    ports:
      - "5432:5432"
    volumes:
      - thesis_db_data:/var/lib/postgresql/data

  service_provider_app:
    build:
      context: .
      dockerfile: service_provider_app/Dockerfile
    container_name: thesis_service_provider
    env_file:
      - ./service_provider_app/.env
    ports:
      - "8001:8001"
    depends_on:
      - db

  client_app:
    build:
      context: .
      dockerfile: client_app/Dockerfile
    container_name: thesis_client
    env_file:
      - ./client_app/.env
    ports:
      - "8000:8000"
    depends_on:
      - service_provider_app

volumes:
  thesis_db_data: